<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBB UMS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: hsl(0, 0%, 8%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: hsl(0, 0%, 12%);
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
    }

    .avatar {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h2 {
      color: white;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .location {
      color: hsl(75, 94%, 57%);
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .bio {
      color: white;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .links a {
      display: block;
      background-color: hsl(0, 0%, 20%);
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-weight: 600;
      transition: 0.3s;
    }

    .links a:hover {
      background-color: hsl(75, 94%, 57%);
      color: black;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://raw.githubusercontent.com/nayla1119/LogoUBB/main/logo%20tanpa%20bg.jpeg" alt="UBB" class="avatar">

    <h2>Unit Bola Basket</h2>
    <p class="location">Universitas Muhammadiyah Surakarta</p>
    <p class="bio">"Chasing Greatness Together"</p>

    <div class="links">
      <a href="https://www.instagram.com/timbasketums?igsh=OHozOHlrcWJsb2l6" target="_blank">Instagram</a>
      <a href="https://www.instagram.com/event.ubbums?igsh=NnE3bnVhazBlNWVv" target="_blank">Instagram Event</a>
      <a href="https://www.tiktok.com/@timbasketums_?_r=1&_t=ZS-95GM4VdHooL" target="_blank">Tiktok</a>
      <a href="https://www.facebook.com/share/1AXjBPmmoe/" target="_blank">Facebook</a>
    </div>
  </div>

</body>
</html>
